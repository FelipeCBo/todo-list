<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <div id="app">

        <aside id="sidebar">

            <h2>Projects</h2>

            <div id="projects"></div>

            <button id="new-project-btn">
                + New Project
            </button>

        </aside>

        <main id="main-content">

            <h1>Todo list</h1>

            <div id="todos"></div>

            <button id="new-todo-btn">
                + New Todo
            </button>

            <form id="todo-form">

                <input 
                    type="text"
                    id="todo-title"
                    placeholder="Todo title"
                >

                <input 
                    type="text"
                    id="todo-description"
                    placeholder="Description"
                >

                <input 
                    type="date"
                    id="todo-date"
                >

                <select id="todo-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <button type="submit">
                    Add todo
                </button>

            </form>

        </main>

    </div>

</body>
</html>
